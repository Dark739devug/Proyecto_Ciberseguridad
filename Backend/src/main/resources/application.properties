# ===============================
# CONFIGURACION DE BASE DE DATOS
# Usar variables de entorno en produccion:
#   DB_URL, DB_USERNAME, DB_PASSWORD
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_facturacion_web
spring.datasource.username=postgres
spring.datasource.password=Somelikeyou12K@


spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACION JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CONFIGURACION DEL SERVIDOR
# ===============================
server.port=9090
spring.application.name=backend

# ===============================
# Logging (no exponer queries SQL ni parametros)
# ===============================
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN