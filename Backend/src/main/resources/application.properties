# ===============================
# CONFIGURACION DE BASE DE DATOS
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACION DEL SERVIDOR (¡Nuevo!)
# ===============================
# Usa el puerto de Render, o el 9090 si estás en local
server.port=${PORT:9090}

# (Deja el resto de tu configuración igual...)

# ===============================
# (El resto de tu archivo déjalo exactamente igual)
# ===============================
# ===============================
# CONFIGURACION JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CONFIGURACION DEL SERVIDOR
# ===============================
server.port=9090
spring.application.name=backend

# ===============================
# Logging (no exponer queries SQL ni parametros)
# ===============================
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN